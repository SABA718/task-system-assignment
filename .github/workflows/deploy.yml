name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aitpp-backend:${{ github.sha }} ./AiTPP/backend
          docker push ${{ secrets.DOCKER_USERNAME }}/aitpp-backend:${{ github.sha }}

      - name: Build and Push Worker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aitpp-worker:${{ github.sha }} ./AiTPP/worker
          docker push ${{ secrets.DOCKER_USERNAME }}/aitpp-worker:${{ github.sha }}

      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aitpp-frontend:${{ github.sha }} ./AiTPP/frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/aitpp-frontend:${{ github.sha }}

      - name: Update Kubernetes Manifests
        run: |
          # Swap the image tags to the newly built SHA version
          sed -i "s|image: .*aitpp-backend.*|image: ${{ secrets.DOCKER_USERNAME }}/aitpp-backend:${{ github.sha }}|g" AiTPP/k8s/k8s/3-backend-worker.yaml
          sed -i "s|image: .*aitpp-worker.*|image: ${{ secrets.DOCKER_USERNAME }}/aitpp-worker:${{ github.sha }}|g" AiTPP/k8s/k8s/3-backend-worker.yaml
          sed -i "s|image: .*aitpp-frontend.*|image: ${{ secrets.DOCKER_USERNAME }}/aitpp-frontend:${{ github.sha }}|g" AiTPP/k8s/k8s/4-frontend.yaml
          
          # Tell Kubernetes to always pull the new image instead of using the local cache
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: Always|g" AiTPP/k8s/k8s/*.yaml

      - name: Commit and Push Changes to Trigger Argo CD
        run: |
          git config --global user.name "GitHub Actions CI/CD"
          git config --global user.email "actions@github.com"
          git add AiTPP/k8s/k8s/
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
