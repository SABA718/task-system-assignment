version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskdb
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis

  worker:
    build: ./worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend