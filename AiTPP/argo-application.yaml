apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-system-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SABA718/task-system-assignment.git'
    targetRevision: HEAD
    path: k8s/k8s  # Pointing to the exact folder you created
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: task-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true